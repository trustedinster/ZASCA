<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="mgmt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="gw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="900" height="520" rx="12" fill="url(#bg)"/>
  <text x="450" y="35" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">ZASCA 系统架构</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748b" font-size="11">零代理安全管控架构</text>

  <!-- 管理层 -->
  <rect x="30" y="70" width="840" height="120" rx="10" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.4"/>
  <text x="60" y="90" fill="#a78bfa" font-size="11" font-weight="600">管理层</text>

  <g filter="url(#sh)">
    <rect x="50" y="100" width="110" height="65" rx="6" fill="url(#mgmt)"/>
    <text x="105" y="128" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Django管理</text>
    <text x="105" y="145" text-anchor="middle" fill="#e9d5ff" font-size="8">RBAC + 增删改查</text>
  </g>
  <g filter="url(#sh)">
    <rect x="175" y="100" width="110" height="65" rx="6" fill="url(#mgmt)"/>
    <text x="230" y="128" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">审计日志</text>
    <text x="230" y="145" text-anchor="middle" fill="#e9d5ff" font-size="8">全量追踪</text>
  </g>
  <g filter="url(#sh)">
    <rect x="300" y="100" width="110" height="65" rx="6" fill="url(#mgmt)"/>
    <text x="355" y="128" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">工单系统</text>
    <text x="355" y="145" text-anchor="middle" fill="#e9d5ff" font-size="8">审批流程</text>
  </g>
  <g filter="url(#sh)">
    <rect x="425" y="100" width="110" height="65" rx="6" fill="url(#mgmt)"/>
    <text x="480" y="128" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">插件系统</text>
    <text x="480" y="145" text-anchor="middle" fill="#e9d5ff" font-size="8">可扩展</text>
  </g>
  <g filter="url(#sh)">
    <rect x="550" y="100" width="110" height="65" rx="6" fill="url(#mgmt)"/>
    <text x="605" y="128" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">主题引擎</text>
    <text x="605" y="145" text-anchor="middle" fill="#e9d5ff" font-size="8">MD3 / 新拟态</text>
  </g>
  <g filter="url(#sh)">
    <rect x="675" y="100" width="175" height="65" rx="6" fill="url(#mgmt)"/>
    <text x="762" y="128" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">主机保护</text>
    <text x="762" y="145" text-anchor="middle" fill="#e9d5ff" font-size="8">网关隧道管控</text>
  </g>

  <!-- 核心层 -->
  <rect x="30" y="210" width="520" height="120" rx="10" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.4"/>
  <text x="60" y="230" fill="#60a5fa" font-size="11" font-weight="600">核心层（ZASCA Django）</text>

  <g filter="url(#sh)">
    <rect x="50" y="240" width="120" height="65" rx="6" fill="url(#core)"/>
    <text x="110" y="268" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">WinRM客户端</text>
    <text x="110" y="285" text-anchor="middle" fill="#bfdbfe" font-size="8">直连模式</text>
  </g>
  <g filter="url(#sh)">
    <rect x="185" y="240" width="120" height="65" rx="6" fill="url(#core)"/>
    <text x="245" y="268" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Celery任务</text>
    <text x="245" y="285" text-anchor="middle" fill="#bfdbfe" font-size="8">SQLite代理</text>
  </g>
  <g filter="url(#sh)">
    <rect x="320" y="240" width="120" height="65" rx="6" fill="url(#core)"/>
    <text x="380" y="268" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">网关客户端</text>
    <text x="380" y="285" text-anchor="middle" fill="#bfdbfe" font-size="8">Unix套接字</text>
  </g>
  <g filter="url(#sh)">
    <rect x="455" y="240" width="80" height="65" rx="6" fill="url(#core)"/>
    <text x="495" y="268" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">证书管理</text>
    <text x="495" y="285" text-anchor="middle" fill="#bfdbfe" font-size="8">TLS/SSL</text>
  </g>

  <!-- 网关层 -->
  <rect x="570" y="210" width="300" height="120" rx="10" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.4"/>
  <text x="600" y="230" fill="#22d3ee" font-size="11" font-weight="600">网关层（Go，可选）</text>

  <g filter="url(#sh)">
    <rect x="590" y="240" width="120" height="65" rx="6" fill="url(#gw)"/>
    <text x="650" y="268" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">RDP代理</text>
    <text x="650" y="285" text-anchor="middle" fill="#cffafe" font-size="8">SNI路由 :443</text>
  </g>
  <g filter="url(#sh)">
    <rect x="725" y="240" width="120" height="65" rx="6" fill="url(#gw)"/>
    <text x="785" y="268" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">WSS服务</text>
    <text x="785" y="285" text-anchor="middle" fill="#cffafe" font-size="8">隧道 :9000</text>
  </g>

  <!-- 边缘层 -->
  <rect x="30" y="350" width="840" height="120" rx="10" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.4"/>
  <text x="60" y="370" fill="#34d399" font-size="11" font-weight="600">边缘层（Windows主机）</text>

  <g filter="url(#sh)">
    <rect x="50" y="385" width="160" height="65" rx="6" fill="#334155"/>
    <text x="130" y="413" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">Windows主机 A</text>
    <text x="130" y="430" text-anchor="middle" fill="#94a3b8" font-size="8">WinRM直连</text>
  </g>
  <g filter="url(#sh)">
    <rect x="230" y="385" width="160" height="65" rx="6" fill="url(#edge)"/>
    <text x="310" y="413" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Windows主机 B</text>
    <text x="310" y="430" text-anchor="middle" fill="#a7f3d0" font-size="8">隧道保护模式</text>
  </g>
  <g filter="url(#sh)">
    <rect x="410" y="385" width="160" height="65" rx="6" fill="url(#edge)"/>
    <text x="490" y="413" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Windows主机 C</text>
    <text x="490" y="430" text-anchor="middle" fill="#a7f3d0" font-size="8">隧道保护模式</text>
  </g>

  <!-- 终端用户 -->
  <g filter="url(#sh)">
    <rect x="680" y="385" width="170" height="65" rx="6" fill="#78350f"/>
    <text x="765" y="413" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="600">终端用户</text>
    <text x="765" y="430" text-anchor="middle" fill="#fbbf24" font-size="8">RDP客户端 / 浏览器</text>
  </g>

  <!-- 连线 -->
  <line x1="380" y1="305" x2="380" y2="340" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <line x1="650" y1="305" x2="650" y2="340" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>

  <line x1="130" y1="350" x2="130" y2="383" stroke="#60a5fa" stroke-width="1" marker-end="url(#arr)"/>
  <text x="140" y="370" fill="#60a5fa" font-size="7">WinRM</text>

  <line x1="310" y1="350" x2="310" y2="383" stroke="#34d399" stroke-width="1" marker-end="url(#arr)"/>
  <text x="320" y="370" fill="#34d399" font-size="7">WSS</text>

  <line x1="490" y1="350" x2="490" y2="383" stroke="#34d399" stroke-width="1" marker-end="url(#arr)"/>
  <text x="500" y="370" fill="#34d399" font-size="7">WSS</text>

  <line x1="765" y1="350" x2="765" y2="383" stroke="#f59e0b" stroke-width="1" marker-end="url(#arr)"/>
  <text x="775" y="370" fill="#f59e0b" font-size="7">RDP</text>

  <line x1="440" y1="272" x2="588" y2="272" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <!-- 图例 -->
  <g transform="translate(30,485)">
    <circle cx="10" cy="8" r="5" fill="#8b5cf6"/><text x="22" y="12" fill="#94a3b8" font-size="9">管理</text>
    <circle cx="70" cy="8" r="5" fill="#3b82f6"/><text x="82" y="12" fill="#94a3b8" font-size="9">核心</text>
    <circle cx="130" cy="8" r="5" fill="#06b6d4"/><text x="142" y="12" fill="#94a3b8" font-size="9">网关</text>
    <circle cx="190" cy="8" r="5" fill="#10b981"/><text x="202" y="12" fill="#94a3b8" font-size="9">边缘</text>
    <circle cx="250" cy="8" r="5" fill="#f59e0b"/><text x="262" y="12" fill="#94a3b8" font-size="9">用户</text>
    <text x="620" y="12" fill="#475569" font-size="8">网关为可选组件 — ZASCA可通过WinRM直连独立运行</text>
  </g>
</svg>
