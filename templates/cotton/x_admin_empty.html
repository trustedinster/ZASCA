<div class="flex flex-col items-center justify-center py-16">
    <div class="w-16 h-16 rounded-full bg-white/5 backdrop-blur-xl flex items-center justify-center mb-4 border border-white/10">
        <span class="material-symbols-rounded text-4xl text-white/50">{{ attrs.icon|default:"info" }}</span>
    </div>
    <h3 class="text-lg font-medium text-white mb-2">{{ attrs.title }}</h3>
    <p class="text-sm text-white/70 text-center max-w-md">{{ attrs.description }}</p>
    {% if slot %}
    <div class="mt-6">
        {{ slot }}
    </div>
    {% endif %}
</div>
