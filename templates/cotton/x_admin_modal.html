<div x-data="{ open: false }">
    {{ trigger }}

    <div
        x-show="open"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="fixed inset-0 z-50 flex items-center justify-center p-4"
        @click.self="open = false"
        @keydown.escape.window="if(open) open = false"
    >
        <div x-show="open" class="absolute inset-0 bg-black/60 backdrop-blur-xl"></div>

        <div
            x-show="open"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 scale-95"
            x-transition:enter-end="opacity-100 scale-100"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100 scale-100"
            x-transition:leave-end="opacity-0 scale-95"
            class="relative w-full {% if attrs.size == 'lg' %}max-w-4xl{% elif attrs.size == 'xl' %}max-w-6xl{% else %}max-w-lg{% endif %} bg-slate-900/40 backdrop-blur-3xl border border-white/10 rounded-lg shadow-2xl"
        >
            <div class="flex items-center justify-between p-6 pb-4 border-b border-white/10">
                <h3 class="text-lg font-medium text-white">{{ attrs.title }}</h3>
                <button @click="open = false" type="button" class="text-white/70 hover:text-white transition rounded p-1 hover:bg-white/5">
                    <span class="material-symbols-rounded text-xl">close</span>
                </button>
            </div>

            <div class="p-6">
                {{ slot }}
            </div>

            {% if footer %}
            <div class="flex items-center justify-end gap-3 p-6 pt-4 border-t border-white/10">
                {{ footer }}
            </div>
            {% endif %}
        </div>
    </div>
</div>
