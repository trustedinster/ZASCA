{% if attrs.variant == "outlined" %}
<button
    type="{{ attrs.type|default:'button' }}"
    class="inline-flex items-center justify-center gap-2 border border-white/20 text-cyan-400 rounded-md px-4 py-2 hover:bg-white/10 backdrop-blur-xl transition font-medium"
>
    {% if attrs.icon %}<span class="material-symbols-rounded text-lg">{{ attrs.icon }}</span>{% endif %}
    {{ slot }}
</button>

{% elif attrs.variant == "text" %}
<button
    type="{{ attrs.type|default:'button' }}"
    class="inline-flex items-center justify-center gap-2 text-cyan-400 rounded-md px-4 py-2 hover:bg-white/10 backdrop-blur-xl transition font-medium"
>
    {% if attrs.icon %}<span class="material-symbols-rounded text-lg">{{ attrs.icon }}</span>{% endif %}
    {{ slot }}
</button>

{% elif attrs.color == "error" %}
<button
    type="{{ attrs.type|default:'button' }}"
    class="inline-flex items-center justify-center gap-2 bg-red-500/20 hover:bg-red-500/30 text-red-400 rounded-md px-4 py-2 backdrop-blur-xl transition font-medium border border-red-500/30"
>
    {% if attrs.icon %}<span class="material-symbols-rounded text-lg">{{ attrs.icon }}</span>{% endif %}
    {{ slot }}
</button>

{% else %}
<button
    type="{{ attrs.type|default:'button' }}"
    class="inline-flex items-center justify-center gap-2 bg-cyan-500/20 hover:bg-cyan-500/30 text-cyan-400 rounded-md px-4 py-2 backdrop-blur-xl transition font-medium border border-cyan-500/30 shadow-[0_0_20px_-3px_rgba(34,211,238,0.2)]"
>
    {% if attrs.icon %}<span class="material-symbols-rounded text-lg">{{ attrs.icon }}</span>{% endif %}
    {{ slot }}
</button>
{% endif %}
