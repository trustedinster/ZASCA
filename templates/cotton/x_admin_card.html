<div class="bg-white/5 backdrop-blur-2xl border border-white/10 rounded-md shadow-xl p-6">
    {% if attrs.title or attrs.icon %}
    <div class="flex items-center gap-3 mb-4">
        {% if attrs.icon %}
        <span class="material-symbols-rounded text-cyan-400 text-2xl">{{ attrs.icon }}</span>
        {% endif %}
        {% if attrs.title %}
        <h2 class="text-lg font-medium text-white">{{ attrs.title }}</h2>
        {% endif %}
    </div>
    {% endif %}

    <div>
        {{ slot }}
    </div>

    {% if footer %}
    <div class="mt-4 pt-4 border-t border-white/10">
        {{ footer }}
    </div>
    {% endif %}
</div>
