<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZASCA - 系统维护中</title>
    <!-- MD3 Theme CSS -->
    <link rel="stylesheet" href="/static/css/theme.css">
    <!-- Material Icons -->
    <link rel="stylesheet" href="/static/vendor/material-icons/material-icons.min.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
</head>
<body class="md-bg-background md-flex md-items-center md-justify-center md-min-h-screen md-m-0">
    <div class="md-maintenance-card">
        <div class="md-maintenance-icon md-animate-pulse">
            <span class="material-icons md-icon-4xl">build</span>
        </div>
        
        <h1 class="md-text-on-surface md-text-headline-lg md-font-bold md-mb-4">系统升级维护中</h1>
        <p class="md-text-on-surface-variant md-text-body-lg md-mb-6">
            为了提供更稳定、高效的 <strong>ZASCA</strong> 云管理体验，我们正在进行关键的服务器优化。
            <br>在此期间，Web端及开户服务将暂时不可用。
        </p>

        <!-- 一言展示区域 -->
        <div class="md-hitokoto-box md-transition-opacity" id="hitokoto-text">
            加载中...
        </div>

        <!-- 模拟进度条 -->
        <div class="md-progress md-mt-8">
            <div class="md-progress-bar md-bg-primary md-animate-progress" role="progressbar"></div>
        </div>

        <footer class="md-maintenance-footer">
            <span class="md-mr-4"><span class="material-icons md-icon-sm md-align-middle">email</span> 联系管理员</span>
            <span><span class="material-icons md-icon-sm md-align-middle">code</span> GitHub Issues</span>
            <div class="md-mt-3">&copy; 2023 ZASCA Project. Powered by Django.</div>
        </footer>
    </div>

    <script>
        // 定义一言列表，内容积极向上且与ZASCA项目（云、连接、管理、零代理）相关
        const hitokotos = [
            "零代理，无限连接；我们在重塑云端管理的边界。",
            "暂时的停歇，是为了更高效的起航；ZASCA 正在为您铺设更宽广的云路。",
            "简化繁杂，统一未来；让每一台云电脑都触手可及。",
            "代码搭建桥梁，信任连接世界；感谢您的一路相伴。",
            "在云端之上，我们追求极致的稳定与速度，只为更好的您。",
            "减少一分冗余，增加一份掌控；优化正在进行中，请稍候。",
            "跨越物理的界限，用零代理架构守护您的数据孤岛。",
            "每一次系统升级，都是向完美管理迈进的一步。",
            "连接不仅是技术的传递，更是服务的延伸。"
        ];

        const hitokotoElement = document.getElementById('hitokoto-text');
        let currentIndex = 0;

        function updateHitokoto() {
            // 淡出效果
            hitokotoElement.style.opacity = 0;
            
            setTimeout(() => {
                hitokotoElement.innerText = hitokotos[currentIndex];
                hitokotoElement.style.opacity = 1;
                
                currentIndex = (currentIndex + 1) % hitokotos.length;
            }, 500);
        }

        // 初始化显示第一条
        updateHitokoto();

        // 每 6 秒切换一次一言
        setInterval(updateHitokoto, 6000);
    </script>
</body>
</html>
