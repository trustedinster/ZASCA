{% load static markdown_extras %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ doc_title }} - 2c2a</title>
    <link rel="stylesheet" href="{% static 'vendor/material-symbols-rounded/material-symbols-rounded.css' %}">
    <link href="{% static 'css/provider.css' %}" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <style>
        .md-body {
            color: #CAC4D0;
            font-size: 1rem;
            line-height: 1.8;
            word-wrap: break-word;
        }
        .md-body > *:first-child { margin-top: 0; }
        .md-body h1 {
            color: #E6E1E5;
            font-size: 2rem;
            font-weight: 600;
            margin: 0 0 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #49454F;
        }
        .md-body h2 {
            color: #E6E1E5;
            font-size: 1.5rem;
            font-weight: 600;
            margin: 2.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(73, 69, 79, 0.5);
        }
        .md-body h3 {
            color: #E6E1E5;
            font-size: 1.25rem;
            font-weight: 600;
            margin: 2rem 0 0.75rem;
        }
        .md-body h4 {
            color: #E6E1E5;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 1.5rem 0 0.5rem;
        }
        .md-body h5, .md-body h6 {
            color: #E6E1E5;
            font-size: 1rem;
            font-weight: 600;
            margin: 1.25rem 0 0.5rem;
        }
        .md-body p { margin: 0 0 1rem; }
        .md-body a {
            color: #D0BCFF;
            text-decoration: none;
        }
        .md-body a:hover { text-decoration: underline; }
        .md-body strong { color: #E6E1E5; font-weight: 600; }
        .md-body em { font-style: italic; }
        .md-body ul, .md-body ol {
            margin: 0 0 1rem;
            padding-left: 2rem;
        }
        .md-body li { margin: 0.25rem 0; }
        .md-body li > ul, .md-body li > ol { margin: 0.25rem 0; }
        .md-body code {
            color: #D0BCFF;
            background: rgba(73, 69, 79, 0.5);
            padding: 0.15em 0.4em;
            border-radius: 6px;
            font-size: 0.875em;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
        .md-body pre {
            background: rgba(28, 27, 31, 0.8);
            border: 1px solid rgba(73, 69, 79, 0.3);
            border-radius: 12px;
            padding: 1rem;
            overflow-x: auto;
            margin: 0 0 1rem;
        }
        .md-body pre code {
            background: none;
            padding: 0;
            border-radius: 0;
            font-size: 0.875em;
            color: #CAC4D0;
        }
        .md-body blockquote {
            border-left: 4px solid #D0BCFF;
            background: rgba(80, 55, 139, 0.1);
            margin: 0 0 1rem;
            padding: 0.75rem 1rem;
            border-radius: 0 12px 12px 0;
            color: #CAC4D0;
        }
        .md-body blockquote p:last-child { margin-bottom: 0; }
        .md-body blockquote strong { color: #D0BCFF; }
        .md-body hr {
            border: none;
            border-top: 1px solid rgba(73, 69, 79, 0.3);
            margin: 2rem 0;
        }
        .md-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 0 0 1rem;
            border: 1px solid rgba(73, 69, 79, 0.3);
            border-radius: 12px;
            overflow: hidden;
        }
        .md-body th {
            background: rgba(73, 69, 79, 0.3);
            color: #E6E1E5;
            font-weight: 600;
            padding: 0.625rem 1rem;
            text-align: left;
            border: 1px solid rgba(73, 69, 79, 0.3);
        }
        .md-body td {
            padding: 0.625rem 1rem;
            border: 1px solid rgba(73, 69, 79, 0.3);
            color: #CAC4D0;
        }
        .md-body tr:nth-child(even) td {
            background: rgba(73, 69, 79, 0.1);
        }
        .md-body img {
            max-width: 100%;
            border-radius: 12px;
        }
        .md-body .md-alert {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin: 0 0 1rem;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }
        .md-body .md-alert-tip {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .md-body .md-alert-warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .md-body .md-alert-important {
            background: rgba(208, 188, 255, 0.1);
            border: 1px solid rgba(208, 188, 255, 0.3);
        }
        .md-body .md-alert-note {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .md-body .md-alert-caution {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .toc-item {
            display: block;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            color: #CAC4D0;
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .toc-item:hover { background: rgba(73, 69, 79, 0.5); color: #E6E1E5; }
        .toc-item.active { background: rgba(80, 55, 139, 0.4); color: #D0BCFF; font-weight: 500; }
        .toc-h3 { padding-left: 1.25rem; }
        .toc-h4 { padding-left: 2rem; }

        .section-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.625rem 0.75rem;
            border-radius: 12px;
            color: #CAC4D0;
            text-decoration: none;
            font-size: 0.875rem;
            transition: background 0.15s, color 0.15s;
        }
        .section-link:hover { background: rgba(73, 69, 79, 0.5); color: #E6E1E5; }
        .section-link.active { background: rgba(80, 55, 139, 0.4); color: #D0BCFF; font-weight: 500; }

        .glass-panel {
            background: rgba(33, 31, 38, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="min-h-screen bg-fixed bg-center bg-cover text-md-on-surface" style="background-image: url('{% static 'img/bgimg.jpg' %}');">
    <div class="fixed inset-0 pointer-events-none z-0 bg-gradient-to-br from-slate-950/70 via-slate-900/50 to-slate-950/80"></div>

    <nav class="bg-md-surface-container/80 backdrop-blur-xl border-b border-white/10 shadow-sm sticky top-0 z-30">
        <div class="flex items-center justify-between h-14 max-w-[1400px] mx-auto px-4 lg:px-6">
            <a class="flex items-center gap-3 no-underline hover:opacity-90 transition" href="/docs/">
                <img src="/static/img/favicon.svg" alt="2c2a" class="h-7 w-auto">
                <span class="text-md-on-surface font-medium text-lg">{{ doc_title }}</span>
            </a>
            <div class="flex items-center gap-3">
                <a href="{% url 'accounts:login' %}" class="flex items-center gap-2 px-4 py-2 rounded-md-xl text-md-on-surface-variant no-underline text-sm font-medium transition hover:bg-md-surface-variant hover:text-md-on-surface min-h-[40px]">
                    <span class="material-symbols-rounded text-lg">login</span>
                    登录
                </a>
            </div>
        </div>
    </nav>

    <div class="relative z-10 max-w-[1400px] mx-auto px-4 lg:px-6 py-6">
        <div class="flex gap-6">
            <aside class="hidden lg:block w-64 flex-shrink-0">
                <div class="glass-panel p-4 sticky top-20">
                    <h2 class="text-sm font-medium text-md-on-surface-variant mb-3 px-3">章节导航</h2>
                    <nav class="space-y-0.5" id="sectionNav"></nav>
                </div>
            </aside>

            <div class="lg:hidden mb-4 w-full">
                <button id="mobileMenuToggle" class="flex items-center gap-2 px-4 py-2.5 rounded-md glass-panel text-md-on-surface text-sm font-medium cursor-pointer w-full">
                    <span class="material-symbols-rounded text-lg">menu</span>
                    章节导航
                    <span class="material-symbols-rounded text-lg ml-auto">expand_more</span>
                </button>
                <div id="mobileMenu" class="hidden mt-2 glass-panel p-4">
                    <nav class="space-y-0.5" id="mobileSectionNav"></nav>
                </div>
            </div>

            <main class="flex-1 min-w-0">
                <article class="glass-panel p-6 sm:p-8">
                    <div class="md-body" id="mdContent">
                        {{ md_text|markdown_filter }}
                    </div>
                </article>
            </main>

            <aside class="hidden xl:block w-56 flex-shrink-0">
                <div class="glass-panel p-4 sticky top-20 max-h-[calc(100vh-6rem)] overflow-y-auto">
                    <h2 class="text-sm font-medium text-md-on-surface-variant mb-3 px-2">本页目录</h2>
                    <div class="text-sm space-y-0.5" id="tocNav"></div>
                </div>
            </aside>
        </div>
    </div>

    <footer class="relative z-10 bg-md-surface-container/70 backdrop-blur-xl border-t border-white/10 mt-8 py-4">
        <div class="max-w-[1400px] mx-auto text-center px-4">
            <p class="mb-1 text-md-on-surface-variant text-sm">&copy; {% now "Y" %} 2c2a. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var SECTION_ICONS = {
                '账户': 'person', '注册': 'person_add', '登录': 'login', '密码': 'lock',
                '仪表盘': 'dashboard', '概览': 'dashboard',
                '云电脑': 'computer', '远程': 'monitor', 'RDP': 'desktop_windows',
                '申请': 'description', '开户': 'description',
                '邀请': 'link', '令牌': 'key',
                '工单': 'confirmation_number', '问题': 'help', '反馈': 'feedback',
                '提供商': 'admin_panel_settings', '主机': 'dns', '产品': 'inventory_2',
                '管理员': 'manage_accounts', '系统': 'settings', '审计': 'fact_check',
                '常见': 'help', 'FAQ': 'help', 'Q&A': 'help'
            };

            function getIcon(title) {
                for (var key in SECTION_ICONS) {
                    if (title.indexOf(key) !== -1) return SECTION_ICONS[key];
                }
                return 'article';
            }

            var content = document.getElementById('mdContent');
            if (!content) return;

            var headings = content.querySelectorAll('h2, h3, h4');
            headings.forEach(function(h, i) {
                if (!h.id) h.id = 'heading-' + i;
            });

            var h2List = content.querySelectorAll('h2');

            function buildSectionNav(container) {
                h2List.forEach(function(h2) {
                    var a = document.createElement('a');
                    a.href = '#' + h2.id;
                    a.className = 'section-link';
                    a.setAttribute('data-target', h2.id);
                    var icon = document.createElement('span');
                    icon.className = 'material-symbols-rounded text-lg';
                    icon.textContent = getIcon(h2.textContent);
                    a.appendChild(icon);
                    a.appendChild(document.createTextNode(h2.textContent));
                    container.appendChild(a);
                });
            }

            var sectionNav = document.getElementById('sectionNav');
            var mobileSectionNav = document.getElementById('mobileSectionNav');
            if (sectionNav) buildSectionNav(sectionNav);
            if (mobileSectionNav) buildSectionNav(mobileSectionNav);

            var tocNav = document.getElementById('tocNav');
            if (tocNav) {
                headings.forEach(function(h) {
                    var level = parseInt(h.tagName.charAt(1));
                    var a = document.createElement('a');
                    a.href = '#' + h.id;
                    a.className = 'toc-item' + (level === 3 ? ' toc-h3' : level === 4 ? ' toc-h4' : '');
                    a.textContent = h.textContent;
                    a.setAttribute('data-target', h.id);
                    tocNav.appendChild(a);
                });
            }

            var toggle = document.getElementById('mobileMenuToggle');
            var menu = document.getElementById('mobileMenu');
            if (toggle && menu) {
                toggle.addEventListener('click', function() {
                    menu.classList.toggle('hidden');
                    var icon = toggle.querySelector('.material-symbols-rounded:last-child');
                    if (icon) icon.textContent = menu.classList.contains('hidden') ? 'expand_more' : 'expand_less';
                });
            }

            var allTargets = [];
            headings.forEach(function(h) { allTargets.push(h.id); });

            function updateActiveState() {
                var scrollY = window.scrollY;
                var current = '';
                allTargets.forEach(function(id) {
                    var el = document.getElementById(id);
                    if (el && el.offsetTop - 100 <= scrollY) current = id;
                });

                document.querySelectorAll('.section-link, .toc-item').forEach(function(link) {
                    if (link.getAttribute('data-target') === current) {
                        link.classList.add('active');
                    } else {
                        link.classList.remove('active');
                    }
                });
            }

            var scrollTimer;
            window.addEventListener('scroll', function() {
                clearTimeout(scrollTimer);
                scrollTimer = setTimeout(updateActiveState, 50);
            });
            updateActiveState();
        });
    </script>
</body>
</html>
