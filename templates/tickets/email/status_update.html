<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>工单状态更新</title>
</head>
<body class="font-sans leading-relaxed text-gray-800">
    <div class="max-w-[600px] mx-auto p-5">
        <div class="bg-cyan-600 text-white p-5 text-center">
            <h1 class="m-0 text-2xl">工单状态更新</h1>
        </div>
        <div class="bg-gray-100 p-5 my-5">
            <p>您好 {{ ticket.creator.username }}，</p>
            <p>您提交的工单状态已更新：</p>
            
            <div class="bg-white p-4 my-2.5 border-l-4 border-cyan-600">
                <h3 class="mt-0">{{ ticket.title }}</h3>
                <p><strong>工单编号：</strong>{{ ticket.ticket_no }}</p>
            </div>
            
            <div class="bg-blue-50 p-3 my-2.5 rounded-md">
                <p><strong>状态变更：</strong></p>
                <p>{{ old_status }} → <strong>{{ new_status }}</strong></p>
            </div>
            
            <p class="text-center mt-8">
                <a href="{{ site_url }}{% url 'tickets:ticket_detail' ticket.pk %}" class="inline-block px-5 py-2.5 bg-cyan-600 text-white no-underline rounded-md">查看工单详情</a>
            </p>
        </div>
        <div class="text-center text-gray-500 text-xs mt-8">
            <p>此邮件由 ZASCA 工单系统自动发送</p>
        </div>
    </div>
</body>
</html>
