<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>工单已关闭</title>
</head>
<body class="font-sans leading-relaxed text-gray-800">
    <div class="max-w-[600px] mx-auto p-5">
        <div class="bg-emerald-600 text-white p-5 text-center">
            <h1 class="m-0 text-2xl">工单已关闭</h1>
        </div>
        <div class="bg-gray-100 p-5 my-5">
            <p>您好 {{ ticket.creator.username }}，</p>
            <p>您提交的工单已处理完成并关闭：</p>
            
            <div class="bg-white p-4 my-2.5 border-l-4 border-emerald-600">
                <h3 class="mt-0">{{ ticket.title }}</h3>
                <p><strong>工单编号：</strong>{{ ticket.ticket_no }}</p>
                <p><strong>最终状态：</strong>{{ ticket.get_status_display }}</p>
                <p><strong>关闭时间：</strong>{{ ticket.closed_at|date:"Y-m-d H:i:s" }}</p>
            </div>
            
            <p>如果您对处理结果满意，欢迎给予好评。如有其他问题，请随时提交新的工单。</p>
            
            <p class="text-center mt-8">
                <a href="{{ site_url }}{% url 'tickets:ticket_detail' ticket.pk %}" class="inline-block px-5 py-2.5 bg-emerald-600 text-white no-underline rounded-md">查看工单详情</a>
            </p>
        </div>
        <div class="text-center text-gray-500 text-xs mt-8">
            <p>此邮件由 ZASCA 工单系统自动发送</p>
        </div>
    </div>
</body>
</html>
