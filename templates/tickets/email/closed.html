<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>工单已关闭</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #28a745; color: white; padding: 20px; text-align: center; }
        .content { background: #f8f9fa; padding: 20px; margin: 20px 0; }
        .ticket-info { background: white; padding: 15px; margin: 10px 0; border-left: 4px solid #28a745; }
        .footer { text-align: center; color: #666; font-size: 12px; margin-top: 30px; }
        .btn { display: inline-block; padding: 10px 20px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; }
        .rating { text-align: center; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>工单已关闭</h1>
        </div>
        <div class="content">
            <p>您好 {{ ticket.creator.username }}，</p>
            <p>您提交的工单已处理完成并关闭：</p>
            
            <div class="ticket-info">
                <h3>{{ ticket.title }}</h3>
                <p><strong>工单编号：</strong>{{ ticket.ticket_no }}</p>
                <p><strong>最终状态：</strong>{{ ticket.get_status_display }}</p>
                <p><strong>关闭时间：</strong>{{ ticket.closed_at|date:"Y-m-d H:i:s" }}</p>
            </div>
            
            <p>如果您对处理结果满意，欢迎给予好评。如有其他问题，请随时提交新的工单。</p>
            
            <p style="text-align: center; margin-top: 30px;">
                <a href="{{ site_url }}{% url 'tickets:ticket_detail' ticket.pk %}" class="btn">查看工单详情</a>
            </p>
        </div>
        <div class="footer">
            <p>此邮件由 ZASCA 工单系统自动发送</p>
        </div>
    </div>
</body>
</html>
