<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>工单新评论</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #6c757d; color: white; padding: 20px; text-align: center; }
        .content { background: #f8f9fa; padding: 20px; margin: 20px 0; }
        .ticket-info { background: white; padding: 15px; margin: 10px 0; border-left: 4px solid #6c757d; }
        .comment { background: white; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .comment-author { font-weight: bold; color: #007bff; }
        .footer { text-align: center; color: #666; font-size: 12px; margin-top: 30px; }
        .btn { display: inline-block; padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>工单新评论</h1>
        </div>
        <div class="content">
            <p>您好，</p>
            <p>工单 <strong>{{ ticket.title }}</strong> 有新评论：</p>
            
            <div class="ticket-info">
                <p><strong>工单编号：</strong>{{ ticket.ticket_no }}</p>
            </div>
            
            <div class="comment">
                <p class="comment-author">{{ comment.author.username }} 评论：</p>
                <p>{{ comment.content|linebreaksbr }}</p>
                <p><small class="text-muted">{{ comment.created_at|date:"Y-m-d H:i:s" }}</small></p>
            </div>
            
            <p style="text-align: center; margin-top: 30px;">
                <a href="{{ site_url }}{% url 'tickets:ticket_detail' ticket.pk %}" class="btn">查看工单详情</a>
            </p>
        </div>
        <div class="footer">
            <p>此邮件由 ZASCA 工单系统自动发送</p>
        </div>
    </div>
</body>
</html>
