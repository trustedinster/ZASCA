<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>工单新评论</title>
</head>
<body class="font-sans leading-relaxed text-gray-800">
    <div class="max-w-[600px] mx-auto p-5">
        <div class="bg-slate-600 text-white p-5 text-center">
            <h1 class="m-0 text-2xl">工单新评论</h1>
        </div>
        <div class="bg-gray-100 p-5 my-5">
            <p>您好，</p>
            <p>工单 <strong>{{ ticket.title }}</strong> 有新评论：</p>
            
            <div class="bg-white p-4 my-2.5 border-l-4 border-slate-600">
                <p><strong>工单编号：</strong>{{ ticket.ticket_no }}</p>
            </div>
            
            <div class="bg-white p-4 my-2.5 rounded-md">
                <p class="font-bold text-blue-600">{{ comment.author.username }} 评论：</p>
                <p>{{ comment.content|linebreaksbr }}</p>
                <p class="text-sm text-gray-500">{{ comment.created_at|date:"Y-m-d H:i:s" }}</p>
            </div>
            
            <p class="text-center mt-8">
                <a href="{{ site_url }}{% url 'tickets:ticket_detail' ticket.pk %}" class="inline-block px-5 py-2.5 bg-slate-600 text-white no-underline rounded-md">查看工单详情</a>
            </p>
        </div>
        <div class="text-center text-gray-500 text-xs mt-8">
            <p>此邮件由 ZASCA 工单系统自动发送</p>
        </div>
    </div>
</body>
</html>
