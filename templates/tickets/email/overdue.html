<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>工单超时提醒</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #dc3545; color: white; padding: 20px; text-align: center; }
        .content { background: #f8f9fa; padding: 20px; margin: 20px 0; }
        .ticket-info { background: white; padding: 15px; margin: 10px 0; border-left: 4px solid #dc3545; }
        .warning { background: #fff3cd; padding: 10px; margin: 10px 0; border-radius: 5px; color: #856404; }
        .footer { text-align: center; color: #666; font-size: 12px; margin-top: 30px; }
        .btn { display: inline-block; padding: 10px 20px; background: #dc3545; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>工单超时提醒</h1>
        </div>
        <div class="content">
            <p>您好 {{ ticket.assignee.username }}，</p>
            
            <div class="warning">
                <strong>注意：</strong>以下工单已超时或即将超时，请尽快处理。
            </div>
            
            <div class="ticket-info">
                <h3>{{ ticket.title }}</h3>
                <p><strong>工单编号：</strong>{{ ticket.ticket_no }}</p>
                <p><strong>优先级：</strong>{{ ticket.get_priority_display }}</p>
                <p><strong>截止时间：</strong>{{ ticket.due_at|date:"Y-m-d H:i:s" }}</p>
                <p><strong>创建者：</strong>{{ ticket.creator.username }}</p>
            </div>
            
            <p style="text-align: center; margin-top: 30px;">
                <a href="{{ site_url }}{% url 'tickets:ticket_detail' ticket.pk %}" class="btn">立即处理</a>
            </p>
        </div>
        <div class="footer">
            <p>此邮件由 ZASCA 工单系统自动发送</p>
        </div>
    </div>
</body>
</html>
