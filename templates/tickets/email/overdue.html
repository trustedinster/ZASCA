<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>工单超时提醒</title>
</head>
<body class="font-sans leading-relaxed text-gray-800">
    <div class="max-w-[600px] mx-auto p-5">
        <div class="bg-red-600 text-white p-5 text-center">
            <h1 class="m-0 text-2xl">工单超时提醒</h1>
        </div>
        <div class="bg-gray-100 p-5 my-5">
            <p>您好 {{ ticket.assignee.username }}，</p>
            
            <div class="bg-amber-100 p-3 my-2.5 rounded-md text-amber-800">
                <strong>注意：</strong>以下工单已超时或即将超时，请尽快处理。
            </div>
            
            <div class="bg-white p-4 my-2.5 border-l-4 border-red-600">
                <h3 class="mt-0">{{ ticket.title }}</h3>
                <p><strong>工单编号：</strong>{{ ticket.ticket_no }}</p>
                <p><strong>优先级：</strong>{{ ticket.get_priority_display }}</p>
                <p><strong>截止时间：</strong>{{ ticket.due_at|date:"Y-m-d H:i:s" }}</p>
                <p><strong>创建者：</strong>{{ ticket.creator.username }}</p>
            </div>
            
            <p class="text-center mt-8">
                <a href="{{ site_url }}{% url 'tickets:ticket_detail' ticket.pk %}" class="inline-block px-5 py-2.5 bg-red-600 text-white no-underline rounded-md">立即处理</a>
            </p>
        </div>
        <div class="text-center text-gray-500 text-xs mt-8">
            <p>此邮件由 ZASCA 工单系统自动发送</p>
        </div>
    </div>
</body>
</html>
