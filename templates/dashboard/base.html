{% load static %}
<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}ZASCA 仪表盘{% endblock %}</title>
    <link href="{% static 'css/provider.css' %}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
    <nav class="sticky top-0 z-20 bg-slate-950/80 backdrop-blur-xl border-b border-slate-700/50">
        <div class="flex items-center justify-between h-16 px-4 lg:px-6 max-w-7xl mx-auto">
            <div class="flex items-center gap-6">
                <a class="text-cyan-400 font-bold text-lg" href="{% url 'dashboard:index' %}">ZASCA</a>
                <a class="text-slate-400 hover:text-slate-200 text-sm font-medium transition" href="{% url 'dashboard:index' %}">仪表盘</a>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-slate-400 text-sm">欢迎, {{ user.username }}</span>
                <a class="text-slate-400 hover:text-slate-200 text-sm font-medium transition" href="{% url 'accounts:logout' %}">退出</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 lg:px-6 py-6">
        {% block content %}{% endblock %}
    </div>

    <script src="{% static 'vendor/chart.js-3.7.0/chart.min.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
