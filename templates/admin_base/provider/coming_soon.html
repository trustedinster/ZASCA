{% extends "admin_base/base.html" %}

{% block title %}2c2a 提供商后台 - {{ page_title }}{% endblock %}

{% block breadcrumb %}
<a href="{% url 'provider:dashboard' %}" class="hover:text-cyan-400 transition">首页</a>
<span class="material-symbols-rounded text-sm">chevron_right</span>
<span class="text-cyan-400 font-medium">{{ page_title }}</span>
{% endblock %}

{% block content %}
<!-- Coming Soon Placeholder -->
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="text-center">
        <div class="w-20 h-20 mx-auto mb-6 rounded-md bg-cyan-500/10 flex items-center justify-center">
            <span class="material-symbols-rounded text-cyan-400 text-4xl">{{ feature_icon }}</span>
        </div>
        <h2 class="text-2xl font-bold text-white mb-2">{{ feature_name }}</h2>
        <p class="text-white/70 mb-6">该功能正在开发中，敬请期待</p>
        <a
            href="{% url 'provider:dashboard' %}"
            class="inline-flex items-center gap-2 px-6 py-3 bg-cyan-600 text-white rounded-md font-medium hover:bg-cyan-600/90 transition"
        >
            <span class="material-symbols-rounded text-lg">arrow_back</span>
            返回仪表盘
        </a>
    </div>
</div>
{% endblock %}
